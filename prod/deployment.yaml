apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: prod-app
  template:
    metadata:
      labels:
        app: prod-app
    spec:
      containers:
      - name: prod-container
        image: us-west1-docker.pkg.dev/qwiklabs-gcp-00-34e822186a64/my-repository/hello-cloudbuild:v2.0
        ports:
        - containerPort: 8080
